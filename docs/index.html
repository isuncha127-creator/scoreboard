<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 허브</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0e1117;
    color: #fafafa;
  }
  .tabbar {
    height: 48px;
    display: flex;
    align-items: stretch;
    background: #161a23;
    border-bottom: 1px solid #2a2f3a;
    padding: 0 12px;
  }
  .tab {
    background: none;
    border: none;
    color: #9aa0ad;
    font-size: 14px;
    font-family: inherit;
    padding: 0 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { color: #fafafa; }
  .tab.active {
    color: #fafafa;
    border-bottom-color: #4C72B0;
  }
  .panel {
    display: none;
    height: calc(100% - 48px);
  }
  .panel.active { display: block; }
  .panel iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <div class="tabbar">
    <button class="tab active" data-target="strategy">전략</button>
  </div>
  <div class="panel active" id="strategy">
    <iframe src="https://y51-scoreboard.streamlit.app" allow="clipboard-read; clipboard-write"></iframe>
  </div>
  <script>
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.target).classList.add("active");
      });
    });
  </script>
</body>
</html>
