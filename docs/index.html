<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 허브</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0e1117;
    color: #fafafa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 80px;
  }
  h1 { font-size: 28px; margin-bottom: 40px; }
  .cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 0 20px;
  }
  a.card {
    display: block;
    width: 220px;
    padding: 24px;
    background: #161a23;
    border: 1px solid #2a2f3a;
    border-radius: 12px;
    color: #fafafa;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.2s;
  }
  a.card:hover {
    border-color: #4C72B0;
    transform: translateY(-2px);
  }
  .card .icon { font-size: 28px; margin-bottom: 12px; }
  .card .title { font-size: 16px; font-weight: 600; }
  .card .desc { font-size: 13px; color: #9aa0ad; margin-top: 6px; }
</style>
</head>
<body>
  <h1>대시보드 허브</h1>
  <div class="cards">
    <a class="card" href="strategy/">
      <div class="icon">📊</div>
      <div class="title">03Y51 스코어보드</div>
      <div class="desc">전략 포트폴리오 스코어보드</div>
    </a>
  </div>
</body>
</html>
