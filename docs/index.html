<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 허브</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0e1117;
    color: #fafafa;
  }
  .tabbar {
    height: 48px;
    display: flex;
    align-items: stretch;
    background: #161a23;
    border-bottom: 1px solid #2a2f3a;
    padding: 0 12px;
  }
  .tab {
    color: #9aa0ad;
    text-decoration: none;
    font-size: 14px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    border-bottom: 2px solid transparent;
  }
  .tab:hover { color: #fafafa; }
  .empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: calc(100% - 48px);
    color: #9aa0ad;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="tabbar">
    <a class="tab" href="https://y51-scoreboard.streamlit.app" target="_blank" rel="noopener">전략 ↗</a>
  </div>
  <div class="empty">탭을 클릭하면 새 탭에서 열립니다</div>
</body>
</html>
